version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: postgres-practica1
    restart: always
    environment:
      POSTGRES_USER: alumno        # Superusuario inicial
      POSTGRES_PASSWORD: alumno123
      POSTGRES_DB: practica1_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data # Persistencia de datos

volumes:
  pg_data: